name: Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate tag
        id: tag
        run: echo "tag=v$(date -u +%Y%m%d).${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Compile mindclip
        run: swiftc -O mindclip.swift -o mindclip

      - name: Package PopClip extension
        run: zip -r MindClip.popclipextz MindClip.popclipext

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            mindclip
            MindClip.popclipextz
